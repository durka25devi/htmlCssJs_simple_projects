<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <!---heading-->
        <div class="heading">WELCOME TO ROCK PAPER SCISSOR GAME</div>

        <!--score bar-->
        <div class="scoreCalculator">
            <div>Machine's Score:<span id="machine-score"></span></div>
            <div>Your's Score:<span id="user-score"></span></div>
        </div>

        <!--choices -->
        <div class="selection">CHOOSE YOUR CHOICE</div>
        <div class="choices">
            <div class="choice" id="rock">ROCK</div>
            <div class="choice" id="paper">PAPER</div>
            <div class="choice" id="scissor">SCISSOR</div>

        </div>

        <div class="user-score-para"></div>
        <div class="machine-score-para"></div>
        <div class="score-para"></div>

    </div>
<script src="index.js"></script>   
</body>
</html>
